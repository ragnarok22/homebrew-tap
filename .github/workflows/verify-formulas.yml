name: Verify Formulas and Casks

on:
  push:
    branches: [main]
    paths: ["Formula/**", "Casks/**"]
  pull_request:
    paths: ["Formula/**", "Casks/**"]

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Link tap
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/${{ github.repository_owner }}/homebrew-tap"
          mkdir -p "$(dirname "$TAP_DIR")"
          ln -s "$GITHUB_WORKSPACE" "$TAP_DIR"

      - name: Audit formulas
        run: brew audit --tap ${{ github.repository_owner }}/tap

      - name: Style check
        run: brew style ${{ github.repository_owner }}/tap
